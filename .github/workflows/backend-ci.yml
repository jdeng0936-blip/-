name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: excavation_platform_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5433/excavation_platform_test"
      REDIS_URL: "redis://localhost:6380/0"
      SECRET_KEY: "ci-test-secret-key-at-least-32-characters!"
      DEBUG: "false"
      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      AI_MODEL: "gpt-4o-mini"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 等待 PostgreSQL + 启用 pgvector
        run: |
          until pg_isready -h localhost -p 5433 -U postgres; do sleep 1; done
          PGPASSWORD=postgres psql -h localhost -p 5433 -U postgres -d excavation_platform_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: 运行测试
        run: |
          python -m pytest tests/ -q --tb=short 2>&1

      - name: 运行 Alembic 迁移检查
        run: |
          alembic check 2>&1 || true
