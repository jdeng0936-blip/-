# Docker Compose 编排 — 掘进工作面规程智能生成平台
# 一键启动：docker compose up -d

services:
  # --- PostgreSQL 16 + pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: excavation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: excavation_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # --- Redis Stack ---
  redis:
    image: redis/redis-stack-server:latest
    container_name: excavation-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- 后端 API ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: excavation-api
    restart: unless-stopped
    env_file: ./backend/.env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # --- 前端 ---
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: excavation-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000/api/v1
    expose:
      - "3000"
    depends_on:
      - api

  # --- Nginx 反代网关 ---
  nginx:
    image: nginx:alpine
    container_name: excavation-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  pg_data:
  redis_data:
