# ═══════════════════════════════════════════════════════
# LLM 模型注册表 — 掘进工作面规程智能生成平台
# ═══════════════════════════════════════════════════════
#
# 规则：
# 1. 业务代码严禁硬编码模型名，必须通过 task_type 查表
# 2. 每个 task_type 配置 models 列表，按优先级排序
# 3. 首选模型失败时，自动 fallback 到下一个
# 4. 修改此文件即可全局切换模型，无需改代码
#
# 通信渠道：LiteLLM 代理网关
#   LITELLM_BASE_URL=http://44.225.205.28:4000/v1
#   所有模型调用统一经过 LiteLLM 路由

# --- LiteLLM 网关已注册模型清单 ---
#
#   Tier 1 (高性能推理):
#     - gemini-3.1-pro-preview      # Google 最新 Pro，最强推理+Tool Calling
#     - gemini-2.5-pro              # Google 稳定版 Pro
#     - gpt-5.2                     # OpenAI 最新旗舰
#
#   Tier 2 (性价比主力):
#     - gemini-3-flash-preview      # Google 最新 Flash，快速推理
#     - gemini-2.5-flash            # Google 稳定版 Flash
#     - gpt-5.1                     # OpenAI 性价比
#
#   Tier 3 (经济型):
#     - gpt-5-mini                  # OpenAI 轻量级
#
#   Embedding:
#     - gemini-embedding-001        # Google 最新 (原生3072, 支持降维1536/768)
#     - text-embedding-005          # Google embedding v5 (768维, fallback)

# --- 任务路由表 ---
tasks:

  # ===== 核心 AI 对话 =====

  # AI 路由引擎 — Tool Calling 意图识别 + 6大工具调度
  # （支护计算/通风计算/循环计算/标准检索/参数查表/安全建议）
  tool_calling:
    models: ["gemini-3.1-pro-preview", "gemini-2.5-pro", "gpt-5.1"]
    temperature: 0.1
    max_tokens: 1024
    note: "核心路由，要求工具调用准确率最高，优先用最强模型"

  # AI 对话 — 掘进智脑通用会话（不含工具调用的纯对话场景）
  chat:
    models: ["gemini-3-flash-preview", "gemini-2.5-flash", "gpt-5-mini"]
    temperature: 0.5
    max_tokens: 2048

  # 工具结果解读 — LLM 解读计算引擎/检索引擎返回的结果
  tool_result_interpret:
    models: ["gemini-3-flash-preview", "gemini-2.5-flash"]
    temperature: 0.3
    max_tokens: 2048

  # ===== 规程文档生成 =====

  # 规程章节生成 — 根据工程参数+标准条款生成规程章节内容
  doc_section_generate:
    models: ["gemini-3.1-pro-preview", "gemini-2.5-pro"]
    temperature: 0.3
    max_tokens: 4096
    note: "规程生成质量要求最高，需要严谨的工程语言"

  # 规程合规性检查 — 对比生成内容与国标/行标，检查合规性
  compliance_check:
    models: ["gemini-3.1-pro-preview", "gemini-2.5-pro"]
    temperature: 0.1
    max_tokens: 2048
    note: "安全关键任务，需最高推理精度"

  # ===== 知识库与检索 =====

  # 标准规范语义检索 — pgvector 召回后的 re-rank / 摘要
  standard_retrieval:
    models: ["gemini-3-flash-preview", "gemini-2.5-flash"]
    temperature: 0.1
    max_tokens: 1024

  # 知识文档解析 — 标准文件/客户规程入库时的结构化解析
  knowledge_parse:
    models: ["gemini-3-flash-preview", "gemini-2.5-flash"]
    temperature: 0.1
    max_tokens: 2048

  # ===== 计算引擎辅助 =====

  # 计算参数智能提取 — 从自然语言中提取支护/通风/循环参数
  param_extract:
    models: ["gemini-3-flash-preview", "gemini-2.5-flash"]
    temperature: 0.1
    max_tokens: 512
    note: "提取精度优先，温度极低"

  # 计算结果安全评估 — 对计算结果进行安全风险评估
  safety_evaluation:
    models: ["gemini-3.1-pro-preview", "gemini-2.5-pro"]
    temperature: 0.1
    max_tokens: 1024
    note: "安全评估必须用最强模型"

  # ===== Embedding =====

  # 向量生成 (1536 维，用于标准条款语义检索)
  embedding:
    models: ["gemini-embedding-001", "text-embedding-005"]
