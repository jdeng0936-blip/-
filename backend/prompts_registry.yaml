# ═══════════════════════════════════════════════════════
# 规程生成核心 Prompt 注册表 (支持多版本迭代/A/B测试)
# ═══════════════════════════════════════════════════════

prompts:
  # --- 章节扩写生成 (Phase 1 & 2) ---
  doc_generation:
    v1_baseline:
      version: "1.0"
      description: "最初版本，仅基于大纲扩写"
      template: |
        请编写掘进工作面作业规程的【{chapter_no} {title}】章节的完整正文。
        
        == 工程参数 ==
        {params_text}
        
        == 章节大纲框架（必须全部保留并大幅扩展每一条） ==
        {outline}
        
        == 标准库和客户已有规程参考资料（务必深度融合） ==
        {rag_context}
        
        直接输出规程正文，不要输出其他客套话。
    v2_few_shot:
      version: "2.0"
      description: "V2优化版，附带了参数基线、计算文本推导和范文 Few-Shot"
      template: |
        请编写掘进工作面作业规程的【{chapter_no} {title}】章节的完整正文。
        
        == 工程参数 ==
        {params_text}
        
        == 章节大纲框架（必须全部保留并大幅扩展每一条） ==
        {outline}
        
        {baseline_text}
        
        {rag_context_text}
        
        {calculation_text}
        
        {few_shot_text}
        
        直接输出排版优美的专业煤矿规程正文段落。不要任何自我介绍或致谢。

  # --- Critic 自评打分引擎 ---
  critic_evaluation:
    v1_standard:
      version: "1.0"
      description: "标准 5 项检查表（模糊表述/数值/法规/结构/责任岗）"
      template: |
        你是煤矿安全规程审核专家。请严格审核以下【{chapter_no} {title}】章节内容，
        逐条检查以下 5 项质量标准：
        
        1. 【模糊表述扫描】：找出所有含"按规定""根据实际""按要求""视情况"等模糊词的条款，
        给出条款编号和具体位置。如无模糊表述，写"无"。
        
        2. 【数值标准检查】：检查是否每条技术措施都有具体数值（距离mm/m、压力MPa、浓度%、
        时间min/h等）。列出缺少数值标准的条款。
        
        3. 【法规引用检查】：统计已引用的法规条款数量。如不足 3 条法规引用，
        列出应补充引用的具体法规和适用条款。
        
        4. 【结构完整性】：检查是否按"一般规定→操作步骤→质量标准→注意事项→应急处置"展开。
        指出缺失的结构块。
        
        5. 【责任岗位检查】：检查关键操作措施是否明确了责任岗位。列出缺失责任人的条款。
        
        == 待审核内容 ==
        {content}
        
        == 输出格式（严格遵循） ==
        SCORE: X/10（整体质量评分）
        ISSUES_COUNT: N（发现问题总数）
        FIXES:
        - [条款位置]: 问题描述 → 修正建议
        - [条款位置]: 问题描述 → 修正建议
        ...
        
        如果整体评分 >= 8/10 且无严重问题，直接输出：
        SCORE: X/10
        ISSUES_COUNT: 0
        PASS

  # --- 跨章节一致性扫描 ---
  consistency_scan:
    v1_keyword:
      version: "1.0"
      description: "跨章节检查断层、设备、编制、水/瓦斯、尺寸矛盾"
      template: |
        你是煤矿规程审核专家。以下是同一份规程各章节的摘要。
        请检查各章节之间的数据一致性，找出矛盾点：
        
        检查项：
        1. 断层数量和参数是否各章一致
        2. 设备型号是否前后统一
        3. 人员编制数量是否一致
        4. 涌水量/瓦斯参数是否一致
        5. 巷道尺寸/断面参数是否一致
        
        {summaries}
        
        如果发现矛盾，输出格式：
        INCONSISTENCY: [章节A] 说"XXX" vs [章节B] 说"YYY" → 应统一为"ZZZ"
        如果无矛盾，输出：CONSISTENT
